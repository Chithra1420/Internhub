<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternHub Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f0eff8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(83, 74, 183, 0.10);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    background: #EEEDFE;
    color: #3C3489;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: #534AB7;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon i { font-size: 22px; color: #EEEDFE; }

  .brand { font-size: 24px; font-weight: 700; color: #1a1a2e; }

  .tagline { font-size: 13px; color: #888; margin-bottom: 2rem; line-height: 1.6; }

  .tabs {
    display: flex;
    background: #f4f3fb;
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 1.5rem;
  }

  .tab {
    flex: 1;
    padding: 9px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    border: none;
    background: transparent;
    color: #888;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: #ffffff;
    color: #534AB7;
    box-shadow: 0 2px 8px rgba(83, 74, 183, 0.12);
  }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .field-inner { position: relative; display: flex; align-items: center; }

  .field-inner i.prefix {
    position: absolute;
    left: 12px;
    font-size: 17px;
    color: #aaa;
    pointer-events: none;
  }

  .field input {
    width: 100%;
    padding: 11px 38px 11px 38px;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    border: 1.5px solid #e8e6f5;
    border-radius: 10px;
    background: #fafafa;
    color: #1a1a2e;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: #534AB7;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(83, 74, 183, 0.10);
  }

  .field input::placeholder { color: #ccc; }

  .toggle-pw {
    position: absolute;
    right: 11px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: #aaa;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  .toggle-pw:hover { color: #534AB7; }
  .toggle-pw i { font-size: 17px; }

  .forgot {
    font-size: 12px;
    color: #534AB7;
    float: right;
    margin-top: 5px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
  }

  .forgot:hover { text-decoration: underline; }

  .primary-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    border: none;
    border-radius: 10px;
    background: #534AB7;
    color: #fff;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .primary-btn:hover {
    background: #3C3489;
    box-shadow: 0 4px 16px rgba(83, 74, 183, 0.25);
  }

  .primary-btn:active { transform: scale(0.98); }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 1.25rem 0;
  }

  .divider span { font-size: 12px; color: #bbb; white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ece9f8; }

  .social-row { display: flex; gap: 10px; }

  .social-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    border: 1.5px solid #e8e6f5;
    border-radius: 10px;
    background: #fff;
    color: #333;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .social-btn:hover { background: #f4f3fb; border-color: #534AB7; }
  .social-btn i { font-size: 18px; }

  .strength-bar {
    height: 4px;
    border-radius: 2px;
    background: #ece9f8;
    margin-top: 6px;
    overflow: hidden;
  }

  .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 11px; font-weight: 600; margin-top: 4px; color: #aaa; }

  .footer-txt { text-align: center; font-size: 12px; color: #aaa; margin-top: 1.5rem; }
  .footer-txt a { color: #534AB7; text-decoration: none; font-weight: 500; }
  .footer-txt a:hover { text-decoration: underline; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a2e;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 99px;
    white-space: nowrap;
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <span class="pill"><i class="ti ti-star"></i> Student Portal</span>
  <div class="logo-row">
    <div class="logo-icon"><i class="ti ti-school"></i></div>
    <span class="brand">InternHub</span>
  </div>
  <p class="tagline">Track internships · Build skills · Grow your future 🚀</p>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
    <button class="tab" id="tab-reg" onclick="switchTab('reg')">Register</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="field">
      <label for="li-email">Email address</label>
      <div class="field-inner">
        <i class="ti ti-mail prefix"></i>
        <input type="email" id="li-email" placeholder="you@university.edu" autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label for="li-pw">Password</label>
      <div class="field-inner">
        <i class="ti ti-lock prefix"></i>
        <input type="password" id="li-pw" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" aria-label="Toggle password" onclick="togglePw('li-pw', this)">
          <i class="ti ti-eye"></i>
        </button>
      </div>
      <a class="forgot" href="#">Forgot password?</a>
    </div>
    <div style="clear:both"></div>
    <button class="primary-btn" onclick="handleLogin()">
      <i class="ti ti-arrow-right"></i> Sign in
    </button>
    <div class="divider"><span>or continue with</span></div>
    <div class="social-row">
      <button class="social-btn"><i class="ti ti-brand-google"></i> Google</button>
      <button class="social-btn"><i class="ti ti-brand-linkedin"></i> LinkedIn</button>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-reg" style="display:none">
    <div class="field">
      <label for="r-name">Full name</label>
      <div class="field-inner">
        <i class="ti ti-user prefix"></i>
        <input type="text" id="r-name" placeholder="Alex Johnson" autocomplete="name">
      </div>
    </div>
    <div class="field">
      <label for="r-email">University email</label>
      <div class="field-inner">
        <i class="ti ti-mail prefix"></i>
        <input type="email" id="r-email" placeholder="you@university.edu" autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label for="r-pw">Create password</label>
      <div class="field-inner">
        <i class="ti ti-lock prefix"></i>
        <input type="password" id="r-pw" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" autocomplete="new-password">
        <button class="toggle-pw" aria-label="Toggle password" onclick="togglePw('r-pw', this)">
          <i class="ti ti-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
      <div class="strength-label" id="s-label"></div>
    </div>
    <button class="primary-btn" onclick="handleRegister()">
      <i class="ti ti-user-plus"></i> Create account
    </button>
    <div class="divider"><span>or sign up with</span></div>
    <div class="social-row">
      <button class="social-btn"><i class="ti ti-brand-google"></i> Google</button>
      <button class="social-btn"><i class="ti ti-brand-linkedin"></i> LinkedIn</button>
    </div>
  </div>

  <p class="footer-txt">
    By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
  </p>
</div>

<div class="toast" id="toast"></div>

<script>
  function switchTab(t) {
    document.getElementById('form-login').style.display = t === 'login' ? '' : 'none';
    document.getElementById('form-reg').style.display  = t === 'reg'   ? '' : 'none';
    document.getElementById('tab-login').className = 'tab' + (t === 'login' ? ' active' : '');
    document.getElementById('tab-reg').className   = 'tab' + (t === 'reg'   ? ' active' : '');
  }

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.querySelector('i').className = show ? 'ti ti-eye-off' : 'ti ti-eye';
  }

  function checkStrength(pw) {
    const fill  = document.getElementById('s-fill');
    const label = document.getElementById('s-label');
    let score = 0;
    if (pw.length >= 8)          score++;
    if (/[A-Z]/.test(pw))        score++;
    if (/[0-9]/.test(pw))        score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
      ['', 0, '#ccc'],
      ['Weak', 25, '#E24B4A'],
      ['Fair', 50, '#EF9F27'],
      ['Good', 75, '#1D9E75'],
      ['Strong', 100, '#534AB7']
    ];
    const [lbl, pct, col] = map[score] || map[0];
    fill.style.width      = pct + '%';
    fill.style.background = col;
    label.textContent     = lbl;
    label.style.color     = col;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function handleLogin() {
    const e = document.getElementById('li-email').value.trim();
    const p = document.getElementById('li-pw').value;
    if (!e || !p) { showToast('Please fill in all fields.'); return; }
    showToast('Signing you in… ✓');
  }

  function handleRegister() {
    const n = document.getElementById('r-name').value.trim();
    const e = document.getElementById('r-email').value.trim();
    const p = document.getElementById('r-pw').value;
    if (!n || !e || !p) { showToast('Please fill in all fields.'); return; }
    if (p.length < 8)   { showToast('Password must be at least 8 characters.'); return; }
    showToast('Account created! Welcome to InternHub 🎉');
  }
</script>

</body>
</html>
